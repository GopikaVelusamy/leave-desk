<div style="position:relative; display:inline-block; vertical-align: middle;">
  <button onclick="toggleNotifications()" id="bell-btn" style="
      background:rgba(255,255,255,0.15);
      border:none;
      color:white;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
      font-size:1.1rem;
      margin-left:10px;
      position:relative;
      vertical-align: middle;
  ">
    🔔
    <span id="notif-badge" style="
        display:none;
        position:absolute;
        top:-5px;
        right:-5px;
        background:#e74c3c;
        color:white;
        border-radius:50%;
        font-size:0.65rem;
        width:18px;
        height:18px;
        line-height:18px;
        text-align:center;
        font-family:sans-serif;
    ">0</span>
  </button>

  <!-- Dropdown panel -->
  <div id="notif-panel" style="
      display:none;
      position:absolute;
      right:0;
      top:45px;
      width:320px;
      background:white;
      border-radius:12px;
      box-shadow:0 8px 30px rgba(0,0,0,0.15);
      z-index:9999;
      overflow:hidden;
  ">
    <div style="padding:14px 18px; background:#1a3a5c; color:white; font-weight:600; font-size:0.9rem; text-align: left;">
      🔔 Notifications
    </div>
    <div id="notif-list" style="max-height:300px; overflow-y:auto;">
      <div style="padding:20px; text-align:center; color:#999; font-size:0.9rem;">
        Loading...
      </div>
    </div>
  </div>
</div>

<!-- Theme selection container next to the bell container -->
<div style="position:relative; display:inline-block; vertical-align: middle;">
  <button onclick="toggleThemeMenu()" id="theme-btn" style="
      background:rgba(255,255,255,0.15);
      border:none;
      color:white;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
      font-size:1.1rem;
      margin-left:10px;
      position:relative;
      vertical-align: middle;
  ">
    🎨
  </button>

  <!-- Theme dropdown panel -->
  <div id="theme-panel" style="
      display:none;
      position:absolute;
      right:0;
      top:45px;
      width:180px;
      background:white;
      border-radius:12px;
      box-shadow:0 8px 30px rgba(0,0,0,0.15);
      z-index:9999;
      overflow:hidden;
      border: 1px solid #eee;
  ">
    <div style="padding:10px 14px; background:#f7f9fb; border-bottom:1px solid #eee; font-weight:600; font-size:0.85rem; color:#555; text-align: left;">
      🎨 Choose Color
    </div>
    <div style="padding:8px; display: flex; flex-direction: column; gap: 4px;">
      <button class="theme-option" onclick="setThemeColor('blue')" style="text-align: left; padding: 8px 12px; border: none; background: none; width: 100%; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #1a3a5c; display: flex; align-items: center; gap: 8px;">
        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#1a3a5c;"></span> Blue (Default)
      </button>
      <button class="theme-option" onclick="setThemeColor('green')" style="text-align: left; padding: 8px 12px; border: none; background: none; width: 100%; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #1b5e20; display: flex; align-items: center; gap: 8px;">
        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#1b5e20;"></span> Green
      </button>
      <button class="theme-option" onclick="setThemeColor('purple')" style="text-align: left; padding: 8px 12px; border: none; background: none; width: 100%; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #4a148c; display: flex; align-items: center; gap: 8px;">
        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#4a148c;"></span> Purple
      </button>
      <button class="theme-option" onclick="setThemeColor('red')" style="text-align: left; padding: 8px 12px; border: none; background: none; width: 100%; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #b71c1c; display: flex; align-items: center; gap: 8px;">
        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#b71c1c;"></span> Red
      </button>
      <button class="theme-option" onclick="setThemeColor('orange')" style="text-align: left; padding: 8px 12px; border: none; background: none; width: 100%; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #e65100; display: flex; align-items: center; gap: 8px;">
        <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#e65100;"></span> Orange
      </button>
    </div>
  </div>
</div>

<style>
.theme-option:hover {
  background-color: #f5f8fc !important;
}
</style>

<script>
  (function() {
    let notifOpen = false;
    let themeOpen = false;

    const themes = {
      blue: { primary: '#1a3a5c', secondary: '#2e6da4', gradient: 'linear-gradient(135deg, #1a3a5c, #2e6da4)' },
      green: { primary: '#1b5e20', secondary: '#4caf50', gradient: 'linear-gradient(135deg, #1b5e20, #4caf50)' },
      purple: { primary: '#4a148c', secondary: '#9c27b0', gradient: 'linear-gradient(135deg, #4a148c, #9c27b0)' },
      red: { primary: '#b71c1c', secondary: '#f44336', gradient: 'linear-gradient(135deg, #b71c1c, #f44336)' },
      orange: { primary: '#e65100', secondary: '#ff9800', gradient: 'linear-gradient(135deg, #e65100, #ff9800)' }
    };

    function applyTheme(colorName) {
      const theme = themes[colorName] || themes.blue;
      let styleBlock = document.getElementById('dynamic-theme-style');
      if (!styleBlock) {
        styleBlock = document.createElement('style');
        styleBlock.id = 'dynamic-theme-style';
        document.head.appendChild(styleBlock);
      }
      styleBlock.innerHTML = `
        nav { background: ${theme.gradient} !important; }
        .btn, .btn-submit, .login-btn, .signup-btn:hover { background: ${theme.gradient} !important; color: white !important; }
        .left-panel { background: ${theme.gradient} !important; }
        .action-btn, .view-all-btn, .edit-btn, .approve, .btn-approve { background: ${theme.secondary} !important; color: white !important; }
        .action-btn:hover, .view-all-btn:hover, .edit-btn:hover, .approve:hover, .btn-approve:hover { background: ${theme.primary} !important; }
        .card h2, .right-panel h2, .card h1, .welcome-card h1, .hero h1 { color: ${theme.primary} !important; }
        .stat-card.active { border-color: ${theme.secondary} !important; }
        .balance-card h3, .stat-card h2, .stat-box h1, .balance-card h3, .stat-card h3 { color: ${theme.secondary} !important; }
        .signup-link a, .links a, a { color: ${theme.secondary}; }
        .signup-link a:hover, .links a:hover, a:hover { color: ${theme.primary}; }
      `;
    }

    async function fetchNotifications() {
      try {
        const res = await fetch("/get_notifications");
        const data = await res.json();
        const badge = document.getElementById("notif-badge");
        const list = document.getElementById("notif-list");

        if (!badge || !list) return;

        if (data.length === 0) {
          badge.style.display = "none";
          list.innerHTML = '<div style="padding:20px; text-align:center; color:#999; font-size:0.9rem;">No new notifications 🎉</div>';
        } else {
          badge.style.display = "inline-block";
          badge.textContent = data.length > 9 ? "9+" : data.length;
          list.innerHTML = data.map(n => `
            <div style="
                padding:12px 18px;
                border-bottom:1px solid #f0f0f0;
                font-family:'DM Sans',sans-serif;
                text-align: left;
            ">
              <div style="
                  font-weight:600;
                  color:${n.type === 'success' ? '#1a7a4a' : n.type === 'error' ? '#c0392b' : '#1a3a5c'};
                  font-size:0.85rem;
                  margin-bottom:3px;
              ">${n.title}</div>
              <div style="color:#555; font-size:0.82rem; line-height:1.4;">${n.message}</div>
            </div>
          `).join('');
        }
      } catch(e) {
        console.log("Notification fetch error:", e);
      }
    }

    async function toggleNotifications() {
      const panel = document.getElementById("notif-panel");
      notifOpen = !notifOpen;
      if (panel) panel.style.display = notifOpen ? "block" : "none";

      if (notifOpen) {
        // close theme panel if open
        const themePanel = document.getElementById("theme-panel");
        if (themePanel) themePanel.style.display = "none";
        themeOpen = false;

        await fetchNotifications();
        // Mark all as read after viewing
        setTimeout(async () => {
          try {
            await fetch("/mark_notifications_read", { method: "POST" });
            const badge = document.getElementById("notif-badge");
            if (badge) badge.style.display = "none";
          } catch(e) {}
        }, 2000);
      }
    }

    function toggleThemeMenu() {
      const panel = document.getElementById("theme-panel");
      themeOpen = !themeOpen;
      if (panel) panel.style.display = themeOpen ? "block" : "none";
      if (themeOpen) {
        // close notification panel if open
        const notifPanel = document.getElementById("notif-panel");
        if (notifPanel) notifPanel.style.display = "none";
        notifOpen = false;
      }
    }

    function setThemeColor(colorName) {
      localStorage.setItem('theme-color', colorName);
      applyTheme(colorName);
      const panel = document.getElementById("theme-panel");
      if (panel) panel.style.display = "none";
      themeOpen = false;
    }

    // Expose functions to window context
    window.toggleNotifications = toggleNotifications;
    window.toggleThemeMenu = toggleThemeMenu;
    window.setThemeColor = setThemeColor;

    // Apply saved theme color immediately
    const savedColor = localStorage.getItem('theme-color') || 'blue';
    applyTheme(savedColor);

    // Close panel when clicking outside
    document.addEventListener("click", function(e) {
      // Handle notifications click outside
      const notifPanel = document.getElementById("notif-panel");
      const bellBtn = document.getElementById("bell-btn");
      if (notifPanel && bellBtn && !notifPanel.contains(e.target) && !bellBtn.contains(e.target)) {
        notifPanel.style.display = "none";
        notifOpen = false;
      }

      // Handle theme click outside
      const themePanel = document.getElementById("theme-panel");
      const themeBtn = document.getElementById("theme-btn");
      if (themePanel && themeBtn && !themePanel.contains(e.target) && !themeBtn.contains(e.target)) {
        themePanel.style.display = "none";
        themeOpen = false;
      }
    });

    // Auto-fetch on page load to show badge
    fetchNotifications();

    // Refresh every 60 seconds
    setInterval(fetchNotifications, 60000);
  })();
</script>
