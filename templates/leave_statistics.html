<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Statistics</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'DM Sans',sans-serif;
    background:#eef2f7;
}

nav{
    background:linear-gradient(135deg,#1a3a5c,#2e6da4);
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'DM Serif Display',serif;
    font-size:1.8rem;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:10px;
    padding:8px 14px;
    border-radius:8px;
    background:rgba(255,255,255,0.15);
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.card h2{
    color:#1a3a5c;
    margin-bottom:25px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.stat-box{
    background:#f7f9fb;
    border-radius:12px;
    padding:25px;
    text-align:center;
}

.stat-box h1{
    color:#2e6da4;
    font-size:2.5rem;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#888;
    font-size:0.85rem;
}

</style>
</head>

<body>

<nav>

    <div class="logo">
        📋 Leave Desk
    </div>

    <div class="nav-links">

        <a href="{{ url_for('employee_dashboard') }}">
            Dashboard
        </a>

        <a href="{{ url_for('profile') }}">
            Profile
        </a>

        <a href="{{ url_for('logout') }}">
            Logout
        </a>

    </div>

</nav>

<div class="container">

    <div class="card">

        <h2>📊 Leave Statistics</h2>

        <div class="stats-grid">

            <div class="stat-box">
                <h1>{{ stats.total or 0 }}</h1>
                <p>Total Requests</p>
            </div>

            <div class="stat-box">
                <h1>{{ stats.approved or 0 }}</h1>
                <p>Approved</p>
            </div>

            <div class="stat-box">
                <h1>{{ stats.rejected or 0 }}</h1>
                <p>Rejected</p>
            </div>

            <div class="stat-box">
                <h1>{{ stats.pending or 0 }}</h1>
                <p>Pending</p>
            </div>

        </div>

    </div>

    <div class="footer">
        © 2026 LeaveDesk. All Rights Reserved.
    </div>

</div>

</body>
</html>
